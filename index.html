    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TL47034KBM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // Consent Mode v2 defaults: deny everything until the user opts in
      // (CookieConsent.tsx flips analytics/ad storage to 'granted' on consent).
      gtag('consent', 'default', {
        ad_storage: 'denied',
        analytics_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        wait_for_update: 500
      });
      // send_page_view: false - the SPA's ScrollToTop sends page_view on every
      // route (including the first), so the config must not auto-send one too.
      gtag('config', 'G-TL47034KBM', { send_page_view: false });
    </script>
